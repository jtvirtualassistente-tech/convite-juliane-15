<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Convite Juliane 15 Anos</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        background: #030716;
        color: #fff9ec;
        font-family: Georgia, "Times New Roman", serif;
      }

      .card {
        position: relative;
        display: grid;
        width: min(420px, 100vw);
        min-height: min(760px, 100vh);
        place-items: center;
        overflow: hidden;
        padding: 42px 28px;
        text-align: center;
        background:
          linear-gradient(180deg, rgba(3, 7, 22, 0.18), rgba(3, 7, 22, 0.88)),
          url("/images/noite-estrelada-convite.png") center / cover;
      }

      .card::before {
        position: absolute;
        inset: 18px;
        content: "";
        border: 1px solid rgba(240, 220, 160, 0.4);
      }

      .content {
        position: relative;
        z-index: 1;
      }

      .eyebrow,
      .date {
        color: #f0dca0;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 34px 0 0;
        font-size: 74px;
        font-weight: 400;
        line-height: 0.86;
      }

      h2 {
        margin: 10px 0 34px;
        color: #f0dca0;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      p {
        margin: 0 auto 28px;
        max-width: 310px;
        color: rgba(255, 249, 236, 0.82);
        font-family: Arial, sans-serif;
        font-size: 16px;
        line-height: 1.55;
      }

      .place {
        margin-top: 18px;
        color: #fff9ec;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="content">
        <div class="eyebrow">Uma noite estrelada</div>
        <h1>Juliane</h1>
        <h2>15 anos</h2>
        <p>
          Sob a luz das estrelas, um sonho esta prestes a se tornar realidade.
        </p>
        <div class="date">04 de setembro de 2026</div>
        <div class="place">20h00 · Cerimonial Palace</div>
      </div>
    </main>
  </body>
</html>
